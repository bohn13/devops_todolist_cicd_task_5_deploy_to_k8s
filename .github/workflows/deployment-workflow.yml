name: helm-upgrade
run-name: ${{github.actor}} - ${{github.ref_name}}

on:
  workflow_call:
    inputs:
      environment:
        description: 'The environment to deploy to'
        required: true
        type: string
      helm-values-path:
        description: 'Path to the helm values file'
        default: ./todoapp/values.yaml
        type: string
      helm-release-name:
        default: todoapp
        type: string
      image-tag:
        description: 'Docker image tag to deploy'
        required: true
        type: string
jobs:
  deploy-helm:
    name: ${{inputs.environment}}
    runs-on: ubuntu-latest
    environment: ${{inputs.environment}}
    steps:

      - uses: actions/download-artifact@v4
        with:
          name: helm-package

      - uses: actions/download-artifact@v4
        with:
          name: helm-artifacts

      - name: Set up Helm
        uses: azure/setup-helm@v4.2.0

      - name: Set up Kubernetes
        uses: azure/setup-kubectl@v4

      - name: Create k8s Kind Cluster
        uses: helm/kind-action@v1
        with:
          config: cluster.yml

      - name: Dry run
        run: |
          helm install --dry-run --debug todoapp ./todoapp-*.tgz -f ${{inputs.helm-values-path}}

      - name: Deploy Helm to ${{inputs.environment}}
        run: |
          helm upgrade --install --atomic --wait --timeout 300s --debug ${{inputs.helm-release-name}} ./todoapp-*.tgz \
          -f ${{inputs.helm-values-path}} \
          --set todoapp.image.repository="${{secrets.DOCKERHUB_USERNAME}}/todoapp" \
          --set mysql.secrets.MYSQL_ROOT_PASSWORD="${{secrets.MYSQL_ROOT_PASSWORD}}" \
          --set mysql.secrets.MYSQL_USER="${{secrets.MYSQL_USER}}" \
          --set mysql.secrets.MYSQL_PASSWORD="${{secrets.MYSQL_PASSWORD}}" \
          --set todoapp.secrets.SECRET_KEY="${{secrets.SECRET_KEY}}" \
          --set todoapp.secrets.DB_NAME="${{secrets.DB_NAME}}" \
          --set todoapp.secrets.DB_USER="${{secrets.DB_USER}}" \
          --set todoapp.secrets.DB_PASSWORD="${{secrets.DB_PASSWORD}}" \
          --set todoapp.secrets.DB_HOST="${{secrets.DB_HOST}}"

      - name: Debug pods
        if: always()
        run: |
          kubectl get pods -A
          kubectl describe pod -n mysql -l app=mysql
          kubectl get events -n mysql --sort-by='.lastTimestamp'